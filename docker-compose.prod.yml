# ── Production overrides ──────────────────────────────────────────────────────
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:

  backend:
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    # Remove the source-code volume in production
    volumes: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production         # uses Stage 3 — nginx serves built dist/
    ports:
      - "80:80"
    # Remove source-code volume in production
    volumes: []
